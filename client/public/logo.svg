<!-- HTML Version of Shrink Logo (SVG) -->
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="128" fill="#f0fdfa"/>
  
  <!-- Primary Gradient -->
  <defs>
    <linearGradient id="shrinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Link Shape (Simplified Chain) -->
  <g transform="translate(128, 128)">
    <!-- Left circle (part of link) -->
    <circle cx="-35" cy="0" r="20" fill="url(#shrinkGradient)" opacity="0.9"/>
    <!-- Right circle (part of link) -->
    <circle cx="35" cy="0" r="20" fill="url(#shrinkGradient)" opacity="0.9"/>
    <!-- Connection bar -->
    <rect x="-15" y="-8" width="30" height="16" fill="url(#shrinkGradient)" rx="8"/>
    <!-- Shrink arrow indicator -->
    <path d="M 0 -40 L 0 -25 M -8 -32 L 0 -25 L 8 -32" stroke="url(#shrinkGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
